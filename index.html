<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikpro RME V 2.0 — Rekam Medis Praktik Dkter/Klinik</title>

    <script>
        const SUPABASE_URL = 'https://aqqlxytpryuwdggadjlt.supabase.co';
        let   SUPABASE_ANON_KEY = '';   // diisi saat bootstrap via Edge Function
        const supabaseClient    = null;

        const BASE_URL = 'https://raw.githubusercontent.com/Rezaariandes/rekam/main';

        // ── CACHE BUSTER — timestamp otomatis, selalu ambil file terbaru ──
        // Dibulatkan per 10 menit agar tidak refetch setiap detik,
        // tapi selalu fresh setelah deploy baru.
        const _CB = Math.floor(Date.now() / 600000);

        let KLINIK_NAMA   = 'Klinik Klikpro';
        let KLINIK_TITLE  = 'Klikpro RME V 2.0';
        let JABATAN_MEDIS = ['Dokter', 'Admin', 'Paramedis', 'Apoteker', 'Kasir', 'ATLM'];

        let AI_KEYS = {
            gemini:     ['', '', ''],
            groq:       ['', '', ''],
            openrouter: ['', ''],
            openai:     ['', ''],
            mistral:    ['', ''],
            cohere:     [''],
        };

        const FRAGMENT_URLS = {
            css:          BASE_URL + '/css/style.css' + '?v=' + _CB,
            modalRiwayat: BASE_URL + '/components/modal-riwayat.html' + '?v=' + _CB,
            modalUser:    BASE_URL + '/components/modal-user.html' + '?v=' + _CB,
            header:       BASE_URL + '/components/header.html' + '?v=' + _CB,
            nav:          BASE_URL + '/components/nav.html' + '?v=' + _CB,
            pageDaftar:   BASE_URL + '/pages/page-daftar.html' + '?v=' + _CB,
            pageMedis:    BASE_URL + '/pages/page-medis.html' + '?v=' + _CB,
            pageKunjungan:  BASE_URL + '/pages/page-kunjungan.html' + '?v=' + _CB,
            pageUser:     BASE_URL + '/pages/page-user.html' + '?v=' + _CB,
            pageSettings: BASE_URL + '/pages/page-settings.html' + '?v=' + _CB,
            pageLaporan:  BASE_URL + '/pages/page-laporan.html' + '?v=' + _CB,
            pageStok:     BASE_URL + '/pages/page-stok.html' + '?v=' + _CB,
            pageBiaya:    BASE_URL + '/pages/page-biaya.html' + '?v=' + _CB,


            jsSupabase:           BASE_URL + '/js/supabase.js' + '?v=' + _CB,
            jsAuth:               BASE_URL + '/js/auth.js' + '?v=' + _CB,
            jsIcd10Ai:            BASE_URL + '/js/icd10-ai.js' + '?v=' + _CB,
            jsPasien:             BASE_URL + '/js/pasien.js' + '?v=' + _CB,
            jsKunj:               BASE_URL + '/js/kunjungan.js' + '?v=' + _CB,
            jsModal:              BASE_URL + '/js/modal.js' + '?v=' + _CB,
            jsUser:               BASE_URL + '/js/user.js' + '?v=' + _CB,
            jsSettings:           BASE_URL + '/js/settings.js' + '?v=' + _CB,
            jsLaporan:            BASE_URL + '/js/laporan.js' + '?v=' + _CB,
            jsApp:                BASE_URL + '/js/app.js' + '?v=' + _CB,
            jsStok:               BASE_URL + '/js/stok.js' + '?v=' + _CB,
            jsBiaya:              BASE_URL + '/js/biaya.js' + '?v=' + _CB,
            jsInvoice:            BASE_URL + '/js/invoice.js' + '?v=' + _CB,
            jsSuratTemplate:      BASE_URL + '/js/surat-template.js' + '?v=' + _CB,
            jsPemeriksaanMedis:   BASE_URL + '/js/pemeriksaan-medis.js' + '?v=' + _CB,
            jsRealtime:           BASE_URL + '/js/realtime.js' + '?v=' + _CB,
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">

    <style id="dynamic-style"></style>

    <style>
        #app-loading {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #f0f6ff 0%, #e8f4ff 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 16px;
            font-family: 'Sora', sans-serif;
        }
        #app-loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(59,130,246,0.15);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        #app-loading .loading-label { color: #334155; font-weight: 700; font-size: 14px; }
        #app-loading .loading-sub   { color: #64748b; font-size: 11px; font-weight: 500; margin-top: -8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app-error {
            display: none; position: fixed; inset: 0; background: #fff;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 12px; z-index: 9999; color: #ef4444;
            text-align: center; padding: 24px;
            font-family: 'Sora', sans-serif;
        }
        #app-error strong { font-size: 1.1rem; }
        #app-error p { font-size: .88rem; max-width: 420px; color: #64748b; line-height: 1.6; }
        #app-error button {
            padding: 10px 28px; background: #3b82f6; color: white;
            border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer;
            font-family: 'Sora', sans-serif;
            margin-top: 8px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="app-loading">
        <div class="spinner"></div>
        <p class="loading-label">Menyiapkan Klikpro RME...</p>
        <p class="loading-sub" id="loadingStep">Menghubungkan ke server...</p>
    </div>

    <div id="app-error">
        <div style="font-size:3rem">⚠️</div>
        <strong>Gagal Memuat Aplikasi</strong>
        <p id="err-msg"></p>
        <button onclick="location.reload()">🔄 Coba Lagi</button>
    </div>

    <div id="app-root" style="display:none;">
        <div class="bg-base"></div>
        <div class="bg-mesh"><div class="bg-orb"></div></div>
        <div id="toastContainer"></div>

        <div id="slot-pin-lock">
            <div class="pin-overlay" id="pinScreen">
                <div class="pin-container">
                    <div class="pin-icon">🔒</div>
                    <div class="pin-title">Masukkan PIN</div>
                    <div class="form-group mb-3 text-start px-1 mt-3">
                        <label class="form-label" style="font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:0.5px;">PILIH AKUN ANDA</label>
                        <select id="loginUserSelect" class="form-control" style="text-align:center;">
                            <option value="">Memuat user...</option>
                        </select>
                    </div>
                    <div class="pin-subtitle" id="pinSubtitle">Masukkan PIN 6 Digit</div>
                    <div class="pin-dots" id="pinDots">
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                    </div>
                    <div class="pin-pad">
                        <button class="pin-btn" onclick="inputPin(1)">1</button>
                        <button class="pin-btn" onclick="inputPin(2)">2</button>
                        <button class="pin-btn" onclick="inputPin(3)">3</button>
                        <button class="pin-btn" onclick="inputPin(4)">4</button>
                        <button class="pin-btn" onclick="inputPin(5)">5</button>
                        <button class="pin-btn" onclick="inputPin(6)">6</button>
                        <button class="pin-btn" onclick="inputPin(7)">7</button>
                        <button class="pin-btn" onclick="inputPin(8)">8</button>
                        <button class="pin-btn" onclick="inputPin(9)">9</button>
                        <button class="pin-btn action-btn" onclick="location.reload()">Batal</button>
                        <button class="pin-btn" onclick="inputPin(0)">0</button>
                        <button class="pin-btn action-btn" onclick="deletePin()">⌫</button>
                    </div>
                </div>
            </div>
        </div>

        <datalist id="list-icd"></datalist>
        <div id="slot-modal-riwayat"></div>
        <div id="slot-modal-user"></div>

        <div id="slot-header"></div>
        <div id="slot-nav"></div>

        <div id="slot-page-daftar"></div>
        <div id="slot-page-medis"></div>
        <div id="slot-page-kunjungan"></div>
        <div id="slot-page-user"></div>
        <div id="slot-page-settings"></div>
        <div id="slot-page-laporan"></div>
        <div id="slot-page-stok"></div>
        <div id="slot-page-biaya"></div>
    </div>

    <script>
    function setLoadStep(msg) {
        const el = document.getElementById('loadingStep');
        if (el) el.textContent = msg;
    }

    function injectScript(text) {
        const el = document.createElement('script');
        el.textContent = text;
        document.body.appendChild(el);
    }

    async function bootstrap() {
        try {
            // ── 0. Ambil anon key dari Edge Function ──
            setLoadStep('Menghubungkan ke server...');
            try {
                const cfgRes = await fetch(SUPABASE_URL + '/functions/v1/get-config');
                if (!cfgRes.ok) throw new Error('Edge Function get-config gagal: ' + cfgRes.status);
                const cfg = await cfgRes.json();
                if (!cfg.anon_key) throw new Error('anon_key tidak ditemukan di respons get-config');
                SUPABASE_ANON_KEY = cfg.anon_key;
            } catch(e) {
                throw new Error('Gagal mengambil konfigurasi keamanan: ' + e.message);
            }

            setLoadStep('Mengunduh tampilan...');

            const htmlKeys = ['css','modalRiwayat','modalUser','header','nav',
                              'pageDaftar','pageMedis','pageKunjungan','pageUser',
                              'pageSettings','pageLaporan','pageStok','pageBiaya'];
            const htmlResults = await Promise.all(
                htmlKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh: ' + key);
                        return r.text();
                    })
                )
            );
            const [css, modalRiwayat, modalUser, header, nav,
                   pageDaftar, pageMedis, pageKunjungan, pageUser,
                   pageSettings, pageLaporan, pageStok, pageBiaya] = htmlResults;

            setLoadStep('Memuat antarmuka...');
            document.getElementById('dynamic-style').innerHTML      = css;
            document.getElementById('slot-modal-riwayat').innerHTML = modalRiwayat;
            document.getElementById('slot-modal-user').innerHTML    = modalUser;
            document.getElementById('slot-header').innerHTML        = header;
            document.getElementById('slot-nav').innerHTML           = nav;
            document.getElementById('slot-page-daftar').innerHTML   = pageDaftar;
            document.getElementById('slot-page-medis').innerHTML    = pageMedis;
            document.getElementById('slot-page-kunjungan').innerHTML = pageKunjungan;
            document.getElementById('slot-page-user').innerHTML     = pageUser;
            document.getElementById('slot-page-settings').innerHTML = pageSettings;
            document.getElementById('slot-page-laporan').innerHTML  = pageLaporan;
            document.getElementById('slot-page-stok').innerHTML     = pageStok;
            document.getElementById('slot-page-biaya').innerHTML    = pageBiaya;

            const h1   = document.querySelector('.app-title h1');
            const span = document.querySelector('.app-title span');
            if (h1)   h1.innerText   = KLINIK_TITLE;
            if (span) span.innerText = KLINIK_NAMA;

            setLoadStep('Memuat modul aplikasi...');

            // URUTAN LOAD (wajib diikuti):
            // supabase.js → settings.js → auth.js → icd10-ai.js → ... → pemeriksaan-medis.js → app.js
            // auth.js     mencakup: auth.js + auth-secure.js (DIGABUNG)
            // icd10-ai.js mencakup: icd10.js + ai-rekomendasi.js (DIGABUNG)
            const jsKeys = [
                'jsSupabase',
                'jsSettings', 'jsAuth',
                'jsIcd10Ai',
                'jsPasien', 'jsKunj',
                'jsModal', 'jsUser',
                'jsLaporan', 'jsStok', 'jsBiaya', 'jsInvoice',
                'jsSuratTemplate',
                'jsPemeriksaanMedis',
                'jsApp',
                'jsRealtime',
            ];

            const jsTexts = await Promise.all(
                jsKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh modul: ' + key);
                        return r.text();
                    })
                )
            );

            setLoadStep('Menginisialisasi sistem...');
            for (const scriptText of jsTexts) {
                try { injectScript(scriptText); } catch (e) { console.warn('Peringatan modul:', e); }
            }

            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-root').style.display    = 'block';

            if (typeof initApp === 'function') initApp();
            if (typeof initRealtime === 'function') initRealtime();

        } catch (err) {
            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-error').style.display   = 'flex';
            document.getElementById('err-msg').textContent =
                err.message + '. Pastikan koneksi internet aktif dan URL GitHub di konfigurasi sudah benar.';
            console.error('[Klikpro Bootstrap Error]', err);
        }
    }

    window.addEventListener('DOMContentLoaded', bootstrap);
    </script>

</body>
</html>
